<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  projectId: "PASTE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let roomId = null;

// 🔥 START MATCHING
window.start = async function() {
  const topic = document.getElementById("topic").value;
  document.getElementById("status").innerText = "Searching...";

  // Check if someone is waiting
  const q = query(collection(db, "waitingUsers"), where("topic", "==", topic));
  const snapshot = await getDocs(q);

  if (!snapshot.empty) {
    // MATCH FOUND
    const otherUser = snapshot.docs[0];

    // Create room
    const room = await addDoc(collection(db, "rooms"), {
      topic: topic,
      createdAt: Date.now()
    });

    roomId = room.id;

    // Remove waiting user
    await deleteDoc(doc(db, "waitingUsers", otherUser.id));

    document.getElementById("status").innerText = "Connected!";
    listenForMessages();

  } else {
    // NO MATCH → WAIT
    const waiting = await addDoc(collection(db, "waitingUsers"), {
      topic: topic,
      createdAt: Date.now()
    });

    // Listen for room creation
    onSnapshot(collection(db, "rooms"), (snapshot) => {
      snapshot.forEach(docSnap => {
        if (docSnap.data().topic === topic) {
          roomId = docSnap.id;
          document.getElementById("status").innerText = "Connected!";
          listenForMessages();
        }
      });
    });
  }
};

// 💬 SEND MESSAGE
window.send = async function() {
  const msg = document.getElementById("msg").value;
  if (!msg || !roomId) return;

  await addDoc(collection(db, "messages"), {
    roomId: roomId,
    text: msg,
    createdAt: Date.now()
  });

  document.getElementById("msg").value = "";
};

// 👂 LISTEN FOR CHAT
function listenForMessages() {
  const q = query(collection(db, "messages"), where("roomId", "==", roomId));

  onSnapshot(q, (snapshot) => {
    const chat = document.getElementById("messages");
    chat.innerHTML = "";

    snapshot.forEach(doc => {
      chat.innerHTML += `<p>${doc.data().text}</p>`;
    });
  });
}
</script>
