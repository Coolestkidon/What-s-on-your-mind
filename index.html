<!DOCTYPE html>
<html>
<head>
  <title>DebateHub</title>
</head>

<body style="background:#0f0f0f;color:white;font-family:Arial">

<h2>Debate Hub Chat</h2>

<button id="loginBtn">Login with Google</button>

<br><br>

<input id="messageInput" placeholder="Type message">
<button id="sendBtn">Send</button>

<div id="chat"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 🔥 PASTE YOUR CONFIG HERE
  const firebaseConfig = {
    apiKey: "PASTE",
    authDomain: "PASTE",
    projectId: "PASTE",
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const provider = new GoogleAuthProvider();

  // LOGIN
  document.getElementById("loginBtn").onclick = async () => {
    try {
      await signInWithPopup(auth, provider);
      alert("Logged in!");
    } catch (err) {
      console.error(err);
      alert("Login failed");
    }
  };

  // SEND MESSAGE
  document.getElementById("sendBtn").onclick = async () => {
    const input = document.getElementById("messageInput");

    if (!input.value) return;

    await addDoc(collection(db, "messages"), {
      text: input.value,
      createdAt: Date.now()
    });

    input.value = "";
  };

  // LIVE CHAT
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, (snapshot) => {
    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    snapshot.forEach(doc => {
      chat.innerHTML += `<p>${doc.data().text}</p>`;
    });
  });
</script>

</body>
</html>
