<!DOCTYPE html>
<html>
<head>
<title>Debate Studio</title>
<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* TOP */
.top {
  padding:15px;
  background:#000;
  display:flex;
  justify-content:space-between;
}

/* MAIN LAYOUT */
.container {
  display:grid;
  grid-template-columns: 1fr 300px;
  height:90vh;
}

/* STUDIO */
.stage {
  display:flex;
  justify-content:space-around;
  align-items:center;
}

/* CHAIRS */
.chair {
  width:250px;
  height:300px;
  background:#1a1a1a;
  border-radius:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  box-shadow:0 0 20px #00ff88;
}

/* CHAT */
.chat {
  background:#111;
  padding:10px;
  overflow:auto;
}

input {
  width:80%;
  padding:10px;
}

button {
  background:#00ff88;
  border:none;
  padding:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="top">
  <div>🎙 Debate Studio</div>
  <div>
    <select id="topic">
      <option>Tech</option>
      <option>Culture</option>
      <option>Debate</option>
    </select>
    <button onclick="start()">Join Studio</button>
  </div>
</div>

<div class="container">

  <!-- STAGE -->
  <div class="stage">
    <div class="chair">
      <h3>You</h3>
      <p>Waiting...</p>
    </div>

    <div class="chair">
      <h3>Stranger</h3>
      <p id="status">Not connected</p>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat">
    <div id="messages"></div>
    <input id="msg">
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
let currentTopic = "";

function start(){
  currentTopic = document.getElementById("topic").value;
  document.getElementById("status").innerText = "Searching for " + currentTopic + "...";
  
  // Simulated match for now
  setTimeout(()=>{
    document.getElementById("status").innerText = "Connected!";
  },2000);
}

function send(){
  let msg = document.getElementById("msg").value;
  document.getElementById("messages").innerHTML += "<p>"+msg+"</p>";
  document.getElementById("msg").value="";
}
</script>

</body>
</html>
