<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debate Studio</title>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body {
  margin:0;
  font-family: Arial,sans-serif;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
  color:white;
}
.top {
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: linear-gradient(90deg, #0a0a0a, #1a1a1a);
  box-shadow: 0 5px 10px #00ff88;
}
#topic-banner {
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background: rgba(0,255,136,0.2);
  color: #00ff88;
  padding:5px 20px;
  border-radius:15px;
  font-weight:bold;
  box-shadow: 0 0 15px #00ff88;
}
.container {
  display:grid;
  grid-template-columns:1fr 300px;
  height:90vh;
}
.stage {
  display:flex;
  justify-content:space-around;
  align-items:flex-end;
  height:70vh;
  padding:20px;
  position: relative;
}
.chair {
  width:280px;
  height:380px;
  background: rgba(30,30,30,0.9);
  border-radius:20px;
  display:flex;
  flex-direction: column;
  align-items:center;
  justify-content:flex-end;
  box-shadow: 0 0 50px #00ff88;
  position: relative;
  padding-bottom: 10px;
}
.chair video {
  width:90%;
  height:200px;
  border-radius:15px;
  margin-bottom:10px;
  object-fit:cover;
  box-shadow:0 0 20px #00ff88;
}
.mic {
  width:25px;
  height:60px;
  background:#444;
  border-radius:12px;
  position:absolute;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  box-shadow:0 0 15px #00ff88;
}
.desk {
  width:100%;
  height:50px;
  background: rgba(20,20,20,0.9);
  position:absolute;
  bottom:0;
  left:0;
  box-shadow: 0 -5px 20px #00ff88;
}
.chat {
  background:#111;
  padding:10px;
  display:flex;
  flex-direction:column;
  border-left:2px solid #00ff88;
}
#messages {
  flex:1;
  overflow:auto;
  margin-bottom:10px;
}
input, button {
  padding:10px;
  margin:2px;
  border:none;
  border-radius:5px;
}
button {
  background:#00ff88;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="top">
  <select id="topic" onchange="updateBanner()">
    <option>Tech</option>
    <option>Culture</option>
    <option>Debate</option>
  </select>
  <button onclick="joinStudio()">Join Studio</button>
</div>

<div id="topic-banner">Current Topic: Tech</div>

<div class="container">
  <div class="stage">
    <div class="chair" id="chair-you">
      <div class="mic"></div>
      <video id="you" autoplay muted playsinline></video>
      <h3>You</h3>
    </div>
    <div class="chair" id="chair-stranger">
      <div class="mic"></div>
      <video id="stranger" autoplay playsinline></video>
      <h3>Stranger</h3>
      <p id="status">Not connected</p>
    </div>
    <div class="desk"></div>
  </div>
  <div class="chat">
    <div id="messages"></div>
    <input id="msg" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  // 🔥 Firebase
